name: QuizGenerator
services:
  contextbuilderservice:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
    depends_on:
      - distributedcachequiz
      - envoy-proxy
      - yarp
      - keycloak
    expose:
      - "8080"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 20s
      timeout: 60s
      retries: 3
      start_period: 60s
    networks:
      - private_net
  llmservice:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
    depends_on:
      - distributedcachequiz
      - contextbuilderservice
      - ollama
      - yarp
    expose:
      - "8080"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 20s
      timeout: 60s
      retries: 3
      start_period: 60s
    networks:
      - private_net
  quizservice:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
    depends_on:
      - quizDb
      - yarp
      - keycloak
    expose:
      - "8080"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 20s
      timeout: 60s
      retries: 3
      start_period: 60s
    networks:
      - private_net
  userservice:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
    depends_on:
      - quizDb
      - yarp
      - keycloak
    expose:
      - "8080"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 20s
      timeout: 60s
      retries: 3
      start_period: 60s
    networks:
      - private_net
  envoy-proxy:
    expose:
      - "5070"
      - "5060"
    command: [ "envoy", "-c", "/etc/envoy/envoy.yml", "--log-level", "info" ]
    restart: unless-stopped
    networks:
      - private_net
      - public_net
    dns:
      - 8.8.8.8
      - 8.8.4.4
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:5070/ready" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - ./Envoy/envoy.yml:/etc/envoy/envoy.yml:ro
  yarp:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
    ports:
      - "5050:8080"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 20s
      timeout: 60s
      retries: 3
      start_period: 60s
    networks:
      - private_net
      - public_net
  quizDb:
    container_name: quizDb
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=1qazXSW@
    restart: always
    expose:
      - "1433"
    volumes:
      - mssql_quiz:/var/lib/mssql/data/
    networks:
      - private_net
  distributedcachequiz:
    container_name: distributedcachequiz
    restart: always
    expose:
      - "6379"
    networks:
      - private_net
  qdrant:
    container_name: qdrantdb
    restart: always
    expose:
      - "6333"
      - "6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - private_net
  ollama:
    expose:
      - "11434"
    environment:
      - OLLAMA_REQUEST_TIMEOUT=10m
      - OLLAMA_CONTEXT_LENGTH=8192
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_MAX_QUEUE=512
    restart: always
    volumes:
      - ollama_volume:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
    networks:
      - private_net
  keycloak:
    container_name: keycloak
    image: quay.io/keycloak/keycloak:26.4.7
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
    command: [ "start-dev" ]
    expose:
      - "8080"
    restart: always
    volumes:
      - keycloak_data:/opt/keycloak/data
    networks:
      - private_net